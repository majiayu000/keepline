name: Bug report
description: Report a reproducible Claude Hub bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Provide the smallest sequence that reproduces the bug.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Bun version, Claude Hub version, and install method.
      placeholder: |
        OS:
        Bun:
        Claude Hub:
        Install method:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs, screenshots, or terminal output. Remove secrets first.
      render: shell
    validations:
      required: false
