      <ellipse cx="0" cy="0" rx="22" ry="13" fill="#c41e3a" stroke="#ffd700" stroke-width="2"/>
      <ellipse cx="0" cy="-6" rx="22" ry="13" fill="#1e4d2b" stroke="#ffd700" stroke-width="2"/>
