# SpaceView Autonomous Runner 配置

# 目标项目路径
workspace_path: /Users/lifcc/Desktop/code/OpenSource/SpaceView

# Memory 文件路径
memory_path: ./memory

# 运行限制（0 = 无限制）
max_iterations: 0
max_cost_usd: 0
max_duration_hours: 0

# 无进展检测
consecutive_no_progress: 5

# 当任务列表为空时是否停止
stop_when_empty: false

# 是否使用 Docker（false = 使用本地 claude 命令）
use_docker: false

# Claude 命令配置
claude_command: claude
claude_args:
  - --dangerously-skip-permissions
