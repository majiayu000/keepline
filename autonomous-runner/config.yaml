# Claude Code Autonomous Runner Configuration
# ============================================

# ============================================================
# 限制配置（安全边界）
# ============================================================

# 最大迭代次数 (0 = 无限)
max_iterations: 0

# 最大成本 (USD) (0 = 无限)
max_cost_usd: 0

# 最大运行时间（小时）(0 = 无限)
max_duration_hours: 0

# 连续无进展次数后停止
# 如果连续 N 次迭代没有文件变化，认为陷入循环
consecutive_no_progress: 5

# 任务队列为空时是否停止
stop_when_empty: false

# ============================================================
# 执行配置
# ============================================================

# 每次迭代后的冷却时间（秒）
# 避免 API 限流
cooldown_seconds: 10

# Worker 超时时间（秒）
# 单次任务最长执行时间
worker_timeout_seconds: 1800  # 30分钟

# ============================================================
# Docker 配置
# ============================================================

# 是否使用 Docker 隔离执行
# true = 更安全，但需要额外配置认证
# false = 直接使用本地 claude 命令（推荐，使用你已登录的账号）
use_docker: false

# Docker 镜像名称
docker_image: "claude-worker"

# ============================================================
# 路径配置
# ============================================================

# 记忆文件目录（存放 TASKS.md, CONTEXT.md, DONE.md）
memory_dir: "memory"

# 工作目录（代码操作在这里进行）
workspace_dir: "workspace"

# 日志目录
log_dir: "logs"
