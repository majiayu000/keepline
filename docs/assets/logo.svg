<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with glow -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cyanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ffff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="magentaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff66ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="60" cy="60" r="58" fill="url(#bgGradient)" stroke="url(#cyanGradient)" stroke-width="2"/>

  <!-- Terminal/Monitor frame -->
  <rect x="25" y="30" width="70" height="50" rx="4" fill="none" stroke="url(#cyanGradient)" stroke-width="2" filter="url(#glow)"/>

  <!-- Screen inner -->
  <rect x="28" y="33" width="64" height="44" rx="2" fill="#0a0a0f"/>

  <!-- Terminal lines (code representation) -->
  <line x1="33" y1="42" x2="55" y2="42" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="33" y1="50" x2="70" y2="50" stroke="#ff00ff" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="33" y1="58" x2="60" y2="58" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="33" y1="66" x2="48" y2="66" stroke="#ff00ff" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- Cursor blink -->
  <rect x="52" y="64" width="8" height="4" fill="#00ffff" filter="url(#glowStrong)">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Eye/Monitor icon (representing observation) -->
  <ellipse cx="78" cy="50" rx="8" ry="6" fill="none" stroke="url(#magentaGradient)" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="78" cy="50" r="3" fill="#ff00ff" filter="url(#glowStrong)"/>

  <!-- Connection dots (representing hub/network) -->
  <circle cx="30" cy="90" r="4" fill="url(#cyanGradient)" filter="url(#glow)"/>
  <circle cx="60" cy="95" r="4" fill="url(#magentaGradient)" filter="url(#glow)"/>
  <circle cx="90" cy="90" r="4" fill="url(#cyanGradient)" filter="url(#glow)"/>

  <!-- Connection lines -->
  <line x1="34" y1="88" x2="56" y2="93" stroke="url(#cyanGradient)" stroke-width="1" opacity="0.5"/>
  <line x1="64" y1="93" x2="86" y2="88" stroke="url(#magentaGradient)" stroke-width="1" opacity="0.5"/>
  <line x1="60" y1="80" x2="60" y2="91" stroke="url(#cyanGradient)" stroke-width="1" opacity="0.5"/>

  <!-- Stand -->
  <rect x="50" y="80" width="20" height="4" fill="url(#cyanGradient)" opacity="0.8"/>
  <rect x="55" y="84" width="10" height="3" fill="url(#cyanGradient)" opacity="0.6"/>
</svg>
