<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with rounded corners -->
  <rect width="1024" height="1024" rx="228" fill="#1A1A2E"/>

  <defs>
    <linearGradient id="orangeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF7B4A"/>
      <stop offset="100%" style="stop-color:#E86A33"/>
    </linearGradient>
    <linearGradient id="coreGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB088"/>
      <stop offset="100%" style="stop-color:#E86A33"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Grid background - subtle control room feel -->
  <g opacity="0.15">
    <line x1="512" y1="150" x2="512" y2="874" stroke="#E86A33" stroke-width="1"/>
    <line x1="150" y1="512" x2="874" y2="512" stroke="#E86A33" stroke-width="1"/>
    <line x1="270" y1="150" x2="270" y2="874" stroke="#E86A33" stroke-width="1"/>
    <line x1="754" y1="150" x2="754" y2="874" stroke="#E86A33" stroke-width="1"/>
    <line x1="150" y1="270" x2="874" y2="270" stroke="#E86A33" stroke-width="1"/>
    <line x1="150" y1="754" x2="874" y2="754" stroke="#E86A33" stroke-width="1"/>
  </g>

  <!-- Outer radar ring -->
  <circle cx="512" cy="512" r="320" stroke="#E86A33" stroke-width="2" fill="none" opacity="0.3"/>
  <circle cx="512" cy="512" r="240" stroke="#E86A33" stroke-width="2" fill="none" opacity="0.4"/>
  <circle cx="512" cy="512" r="160" stroke="#E86A33" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Connection lines from center to session nodes -->
  <g stroke="url(#orangeGlow)" stroke-width="3" opacity="0.6">
    <line x1="512" y1="512" x2="280" y2="280"/>
    <line x1="512" y1="512" x2="744" y2="280"/>
    <line x1="512" y1="512" x2="280" y2="744"/>
    <line x1="512" y1="512" x2="744" y2="744"/>
    <line x1="512" y1="512" x2="512" y2="220"/>
    <line x1="512" y1="512" x2="804" y2="512"/>
    <line x1="512" y1="512" x2="512" y2="804"/>
    <line x1="512" y1="512" x2="220" y2="512"/>
  </g>

  <!-- Session nodes - terminals being monitored -->
  <g filter="url(#softGlow)">
    <!-- Top -->
    <rect x="480" y="188" width="64" height="48" rx="8" fill="#2D2D44" stroke="#E86A33" stroke-width="2"/>
    <rect x="488" y="196" width="48" height="4" rx="2" fill="#4CAF50"/>
    <rect x="488" y="204" width="32" height="4" rx="2" fill="#E86A33"/>
    <rect x="488" y="212" width="40" height="4" rx="2" fill="#666"/>

    <!-- Top-right -->
    <rect x="712" y="248" width="64" height="48" rx="8" fill="#2D2D44" stroke="#E86A33" stroke-width="2"/>
    <rect x="720" y="256" width="48" height="4" rx="2" fill="#E86A33"/>
    <rect x="720" y="264" width="36" height="4" rx="2" fill="#666"/>
    <rect x="720" y="272" width="44" height="4" rx="2" fill="#4CAF50"/>

    <!-- Right -->
    <rect x="772" y="480" width="64" height="48" rx="8" fill="#2D2D44" stroke="#E86A33" stroke-width="2"/>
    <rect x="780" y="488" width="48" height="4" rx="2" fill="#666"/>
    <rect x="780" y="496" width="40" height="4" rx="2" fill="#E86A33"/>
    <rect x="780" y="504" width="32" height="4" rx="2" fill="#4CAF50"/>

    <!-- Bottom-right -->
    <rect x="712" y="712" width="64" height="48" rx="8" fill="#2D2D44" stroke="#FF6B6B" stroke-width="2"/>
    <rect x="720" y="720" width="48" height="4" rx="2" fill="#FF6B6B"/>
    <rect x="720" y="728" width="36" height="4" rx="2" fill="#666"/>
    <rect x="720" y="736" width="28" height="4" rx="2" fill="#666"/>

    <!-- Bottom -->
    <rect x="480" y="772" width="64" height="48" rx="8" fill="#2D2D44" stroke="#E86A33" stroke-width="2"/>
    <rect x="488" y="780" width="48" height="4" rx="2" fill="#4CAF50"/>
    <rect x="488" y="788" width="44" height="4" rx="2" fill="#E86A33"/>
    <rect x="488" y="796" width="36" height="4" rx="2" fill="#666"/>

    <!-- Bottom-left -->
    <rect x="248" y="712" width="64" height="48" rx="8" fill="#2D2D44" stroke="#E86A33" stroke-width="2"/>
    <rect x="256" y="720" width="48" height="4" rx="2" fill="#E86A33"/>
    <rect x="256" y="728" width="40" height="4" rx="2" fill="#4CAF50"/>
    <rect x="256" y="736" width="32" height="4" rx="2" fill="#666"/>

    <!-- Left -->
    <rect x="188" y="480" width="64" height="48" rx="8" fill="#2D2D44" stroke="#4CAF50" stroke-width="2"/>
    <rect x="196" y="488" width="48" height="4" rx="2" fill="#4CAF50"/>
    <rect x="196" y="496" width="44" height="4" rx="2" fill="#4CAF50"/>
    <rect x="196" y="504" width="40" height="4" rx="2" fill="#E86A33"/>

    <!-- Top-left -->
    <rect x="248" y="248" width="64" height="48" rx="8" fill="#2D2D44" stroke="#E86A33" stroke-width="2"/>
    <rect x="256" y="256" width="48" height="4" rx="2" fill="#E86A33"/>
    <rect x="256" y="264" width="36" height="4" rx="2" fill="#4CAF50"/>
    <rect x="256" y="272" width="44" height="4" rx="2" fill="#666"/>
  </g>

  <!-- Central command hub -->
  <g filter="url(#glow)">
    <circle cx="512" cy="512" r="100" fill="#2D2D44" stroke="url(#orangeGlow)" stroke-width="4"/>
    <!-- Inner core -->
    <circle cx="512" cy="512" r="60" fill="url(#coreGlow)"/>
    <!-- Pulse rings -->
    <circle cx="512" cy="512" r="75" stroke="#E86A33" stroke-width="2" fill="none" opacity="0.6"/>
    <circle cx="512" cy="512" r="85" stroke="#E86A33" stroke-width="1" fill="none" opacity="0.3"/>
  </g>

  <!-- Status indicators on core -->
  <g transform="translate(512, 512)">
    <circle cx="-20" cy="-15" r="8" fill="#4CAF50"/>
    <circle cx="20" cy="-15" r="8" fill="#4CAF50"/>
    <circle cx="0" cy="20" r="8" fill="#E86A33"/>
  </g>
</svg>